<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>智信生日幸運遊戲機</title>
    <style>
        /* --- 🌸 可愛清爽馬卡龍 核心變數定義 --- */
        :root {
            --gold-primary: #E6B800;
            --gold-light: #FFF4B8;
            --gold-dark: #B38F00;
            --champagne: #FFF8E7;
            --cream-white: #FFFFF0;
            --mint-green: #E8F5E9;
            --pastel-pink: #FFF0F5;
            --coral-soft: #FF9E80;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(230, 184, 0, 0.3);
            --bubble-blue: #E3F2FD;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100vh;
            background-color: #FFF8E7;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #4A4A4A;
            overflow: hidden;
        }

        /* 夢幻清爽馬卡龍漸層背景 */
        .game-container {
            width: 100%;
            height: 100vh;
            position: relative;
            background: linear-gradient(135deg, #FFE4E1 0%, #E8F5E9 50%, #E3F2FD 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 緩慢漂浮的小氣球與亮片背景動畫 */
        .particles { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .particle { position: absolute; background: radial-gradient(circle, var(--gold-light) 0%, transparent 80%); border-radius: 50%; opacity: 0.5; animation: floatUp 8s infinite linear; }
        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0.6); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) translateX(30px) scale(1); opacity: 0; }
        }

        /* --- LOADING 畫面 --- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: linear-gradient(135deg, #FFF0F5 0%, #E3F2FD 100%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeOutContainer 0.8s ease-out 2.5s forwards;
        }
        .loading-logo { font-size: 4.5rem; margin-bottom: 20px; animation: bounceLogo 2s infinite ease-in-out; }
        .loading-title { font-size: 1.5rem; font-weight: bold; color: var(--gold-dark); text-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 8px; letter-spacing: 1px; }
        .loading-sub { font-size: 0.9rem; color: #888; margin-bottom: 30px; }
        .progress-container { width: 65%; max-width: 250px; height: 10px; background: rgba(0, 0, 0, 0.05); border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #FFB74D, #FFF176, #FFB74D); animation: loadProgress 2.2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards; box-shadow: 0 0 5px rgba(255,183,77,0.5); }

        /* --- 通用場景與玻璃卡片 --- */
        .scene {
            position: absolute;
            width: 92%;
            max-width: 360px;
            z-index: 10;
            display: none;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .scene.active { display: block; opacity: 1; transform: scale(1); }
        
        .glass-card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border: 2px solid rgba(255,255,255,0.6); 
            border-radius: 32px; 
            padding: 25px 20px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05), inset 0 1px 1px rgba(255,255,255,0.5); 
        }
        #intro-scene { animation: fadeInScene 0.8s ease-out 2.8s forwards; }
        .scene-title { font-size: 1.5rem; color: #4A4A4A; margin-bottom: 15px; font-weight: bold; }
        .story-text { font-size: 0.95rem; line-height: 1.8; color: #5A5A5A; margin-bottom: 25px; }
        .highlight-gold { color: #E67E22; font-weight: bold; }

        /* --- 🎰 可愛風拉霸機 UI --- */
        .slot-machine-frame { background: linear-gradient(135deg, #FF8A80 0%, #FF5252 100%); border: 5px solid #FFF; border-radius: 28px; padding: 15px; box-shadow: 0 10px 25px rgba(255,82,82,0.2), 0 0 10px var(--gold-primary); position: relative; margin-bottom: 15px; }
        .marquee-bulbs { display: flex; justify-content: space-between; padding: 0 10px; margin-bottom: 10px; }
        .bulb { width: 8px; height: 8px; background-color: #FFF; border-radius: 50%; animation: bulbBlink 0.4s infinite alternate; }
        .bulb:nth-child(even) { animation-delay: 0.2s; background-color: #FFF59D; }
        .slots-container { display: flex; justify-content: space-between; background-color: #FFF3E0; padding: 8px; border-radius: 16px; border: 2px solid #FFCC80; gap: 8px; overflow: hidden; }
        
        .slot-window { flex: 1; height: 110px; background-color: #FFF; border-radius: 12px; border: 4px solid #FFF; border-bottom: 14px solid #FFF; box-shadow: 0 5px 10px rgba(0,0,0,0.08); position: relative; overflow: hidden; }
        .slot-reel { position: absolute; top: 0; left: 0; width: 100%; display: flex; flex-direction: column; }
        .slot-item { width: 100%; height: 92px; display: flex; justify-content: center; align-items: center; background: #FAFAFA; overflow: hidden; }
        .slot-item img, .slot-placeholder { width: 100%; height: 100%; object-fit: cover; }
        .slot-placeholder { display: flex; justify-content: center; align-items: center; font-size: 2rem; background: #FFF9C4; }
        
        .game-status-bar { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; font-size: 0.9rem; color: #666; font-weight: bold; }
        .hint-text { font-size: 0.95rem; min-height: 24px; color: #E67E22; margin-bottom: 15px; font-weight: bold; }

        /* --- 🔮 迪士尼經典立體扭蛋機 UI --- */
        .gacha-machine-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            margin-bottom: 15px;
            padding-bottom: 70px;
        }

        .gacha-globe {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6) 0%, rgba(240,248,255,0.2) 60%, rgba(200,220,255,0.4) 100%);
            border-radius: 50%;
            border: 4px solid #FFF;
            position: relative;
            z-index: 3;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05), inset -10px -10px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .gacha-globe::after {
            content: '';
            position: absolute;
            top: 15px; left: 20px;
            width: 40px; height: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        .gacha-ball-pool {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
        }

        .gacha-capsule {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            position: absolute;
            background: linear-gradient(to bottom, #FF8A80 50%, #FFF 50%);
            box-shadow: inset -2px -2px 4px rgba(0,0,0,0.15), 0 3px 6px rgba(0,0,0,0.1);
        }

        .gacha-base {
            width: 150px;
            height: 110px;
            background: linear-gradient(135deg, #FFAB91 0%, #FF7043 100%);
            border: 4px solid #FFF;
            border-top: none;
            border-radius: 0 0 40px 40px / 0 0 25px 25px;
            margin-top: -25px;
            position: relative;
            z-index: 2;
            box-shadow: 0 10px 20px rgba(255,112,67,0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .crank-housing {
            width: 65px; height: 65px;
            background: #FFF;
            border-radius: 50%;
            margin-top: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .gacha-crank { 
            width: 50px; height: 50px; 
            background: linear-gradient(135deg, #FFF59D 0%, #FBC02D 100%); 
            border: 2px solid #FFF; 
            border-radius: 50%; 
            cursor: pointer; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.15); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 1.3rem; 
            transition: transform 0.5s ease-in-out; 
        }
        .crank-rotate { transform: rotate(360deg); }
        
        .gacha-exit { 
            width: 44px; height: 32px; 
            background: #424242; 
            border: 3px solid #FFF; 
            border-radius: 10px 10px 0 0; 
            position: absolute; 
            bottom: 0; 
            box-shadow: inset 0 3px 5px rgba(0,0,0,0.3);
        }

        .spawned-capsule { 
            width: 55px; height: 55px; 
            border-radius: 50%; 
            background: linear-gradient(to bottom, #80D8FF 50%, #FFF 50%); 
            position: absolute; 
            bottom: 10px; 
            left: calc(50% - 27.5px); 
            z-index: 10; 
            cursor: pointer; 
            display: none; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.15); 
        }

        /* --- 📜 彈出式精緻禮物卡片 --- */
        .gift-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(255,240,245,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 200; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.4s, visibility 0.4s; }
        .gift-overlay.active { opacity: 1; visibility: visible; }
        .gift-card { width: 85%; max-width: 310px; background: #FFF; border-radius: 28px; padding: 25px 20px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.08); border: 3px solid var(--gold-light); transform: scale(0.8); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .gift-overlay.active .gift-card { transform: scale(1); }
        .gift-emoji { font-size: 4rem; margin-bottom: 12px; }
        .gift-name { font-size: 1.35rem; color: #4A4A4A; margin-bottom: 8px; font-weight: bold; }
        .gift-desc { font-size: 0.95rem; color: #666; line-height: 1.6; margin-bottom: 20px; }

        /* --- 🖼️ 回憶相簿場景 --- */
        .album-book { width: 100%; height: 260px; position: relative; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; }
        .polaroid-frame { width: 180px; height: 220px; background: #FFF; padding: 12px 12px 35px 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); border-radius: 4px; position: absolute; opacity: 0; transform: scale(0.9) rotate(-5deg); transition: all 0.8s ease-in-out; }
        .polaroid-frame img { width: 100%; height: 100%; object-fit: cover; border: 1px solid #E0E0E0; }
        .polaroid-frame.current { opacity: 1; transform: scale(1.05) rotate(3deg); z-index: 5; animation: kenBurns 2.5s infinite alternate ease-in-out; }
        @keyframes kenBurns { 0% { transform: scale(1.03) rotate(2deg); } 100% { transform: scale(1.07) rotate(4deg); } }

        /* --- 💌 生日祝福最終場景 --- */
        .bless-photo-aside { width: 110px; height: 135px; background: #FFF; padding: 6px 6px 20px 6px; box-sizing: border-box; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border-radius: 2px; transform: rotate(-8deg); margin: 0 auto 15px auto; animation: floatingPolaroid 3s infinite ease-in-out; }
        .bless-photo-aside img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes floatingPolaroid { 0%, 100% { transform: translateY(0) rotate(-6deg); } 50% { transform: translateY(-8px) rotate(-10deg); } }

        /* 可愛圓潤按鈕 */
        .btn-premium { background: linear-gradient(135deg, #FFB74D 0%, #FFA726 100%); border: none; border-radius: 30px; color: #FFF; font-size: 1.05rem; font-weight: bold; padding: 12px 35px; cursor: pointer; box-shadow: 0 5px 15px rgba(245,124,0,0.2); transition: transform 0.1s; width: 85%; letter-spacing: 1px; }
        .btn-premium:active { transform: scale(0.96); }
        .btn-premium:disabled { background: #DDD; color: #AAA; box-shadow: none; cursor: not-allowed; }

        /* 動態軌跡 */
        @keyframes loadProgress { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes fadeOutContainer { 0% { opacity: 1; visibility: visible; } 99% { opacity: 0; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }
        @keyframes fadeInScene { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes bounceLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        @keyframes bulbBlink { 0% { opacity: 0.4; } 100% { opacity: 1; filter: drop-shadow(0 0 4px #FFF59D); } }
